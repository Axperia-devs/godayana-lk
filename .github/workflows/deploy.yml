name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'backend/services/**'
      - 'frontend/**'
      - 'backend/docker/**'
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  # ============ DEPLOY DATABASES (ONCE ONLY) ============
  deploy-databases:
    name: Deploy PostgreSQL Databases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          # Remove old version if exists
          rm -f ~/.railway/bin/railway
          rm -f /usr/local/bin/railway
          
          curl -fsSL railway.com/install.sh | bash
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Verify Railway CLI installation
        run: |
          which railway
          railway --version

      - name: Deploy databases (only if not exist)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
          USER_DB_PASSWORD: ${{ secrets.USER_DB_PASSWORD }}
          OTP_DB_PASSWORD: ${{ secrets.OTP_DB_PASSWORD }}
        run: |
          echo "Linking to project..."
          railway link "$RAILWAY_PROJECT_ID"
    
          # Deploy Auth Database
          if ! railway service list 2>/dev/null | grep -q "postgres-auth"; then
            echo "📦 Creating postgres-auth database..."
            railway add --database postgres
            sleep 5
            # Get the service name (it will be something like 'postgres1234')
            AUTH_SERVICE=$(railway service list | grep postgres | tail -1 | awk '{print $1}')
            railway service rename "$AUTH_SERVICE" postgres-auth
            railway variables --service postgres-auth set POSTGRES_PASSWORD="$AUTH_DB_PASSWORD"
            echo "✅ postgres-auth created"
          else
            echo "✅ postgres-auth already exists - skipping"
          fi
          
          # Deploy User Database
          if ! railway service list 2>/dev/null | grep -q "postgres-user"; then
            echo "📦 Creating postgres-user database..."
            railway add --database postgres
            sleep 5
            USER_SERVICE=$(railway service list | grep postgres | tail -1 | awk '{print $1}')
            railway service rename "$USER_SERVICE" postgres-user
            railway variables --service postgres-user set POSTGRES_PASSWORD="$USER_DB_PASSWORD"
            echo "✅ postgres-user created"
          else
            echo "✅ postgres-user already exists - skipping"
          fi
          
          # Deploy OTP Database
          if ! railway service list 2>/dev/null | grep -q "postgres-otp"; then
            echo "📦 Creating postgres-otp database..."
            railway add --database postgres
            sleep 5
            OTP_SERVICE=$(railway service list | grep postgres | tail -1 | awk '{print $1}')
            railway service rename "$OTP_SERVICE" postgres-otp
            railway variables --service postgres-otp set POSTGRES_PASSWORD="$OTP_DB_PASSWORD"
            echo "✅ postgres-otp created"
          else
            echo "✅ postgres-otp already exists - skipping"
          fi
        
          echo "🎉 Database deployment check completed!"

  # ============ DETECT CHANGED SERVICES ============
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: deploy-databases
    outputs:
      auth-service: ${{ steps.filter.outputs.auth-service }}
      user-service: ${{ steps.filter.outputs.user-service }}
      otp-service: ${{ steps.filter.outputs.otp-service }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'backend/services/auth-service/**'
              - 'backend/common/**'
            user-service:
              - 'backend/services/user-service/**'
              - 'backend/common/**'
            otp-service:
              - 'backend/services/otp-service/**'
              - 'backend/common/**'
            api-gateway:
              - 'backend/services/api-gateway/**'
              - 'backend/common/**'
            frontend:
              - 'frontend/**'

      - name: Show results
        run: |
          echo "Changed services:"
          echo "auth-service: ${{ steps.filter.outputs.auth-service }}"
          echo "user-service: ${{ steps.filter.outputs.user-service }}"
          echo "otp-service: ${{ steps.filter.outputs.otp-service }}"
          echo "api-gateway: ${{ steps.filter.outputs.api-gateway }}"
          echo "frontend: ${{ steps.filter.outputs.frontend }}"

  # ============ BUILD BACKEND SERVICES ============
  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service:
          - name: auth-service
            enabled: ${{ needs.detect-changes.outputs.auth-service == 'true' }}
          - name: user-service
            enabled: ${{ needs.detect-changes.outputs.user-service == 'true' }}
          - name: otp-service
            enabled: ${{ needs.detect-changes.outputs.otp-service == 'true' }}
          - name: api-gateway
            enabled: ${{ needs.detect-changes.outputs.api-gateway == 'true' }}
    steps:
      - name: Checkout code
        if: matrix.service.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up JDK 17
        if: matrix.service.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        if: matrix.service.enabled == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build ${{ matrix.service.name }}
        if: matrix.service.enabled == 'true'
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests -pl services/${{ matrix.service.name }} -am

      - name: Upload JAR artifact
        if: matrix.service.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.name }}-jar
          path: backend/services/${{ matrix.service.name }}/target/*.jar
          retention-days: 1

      - name: Skip message
        if: matrix.service.enabled == 'false'
        run: echo "⏭️ Skipping ${{ matrix.service.name }} - no changes"

  # ============ BUILD FRONTEND ============
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 1

  # ============ BUILD DOCKER IMAGES ============
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: auth-service
            enabled: ${{ needs.detect-changes.outputs.auth-service == 'true' }}
            context: backend
            dockerfile: backend/services/auth-service/Dockerfile
          - name: user-service
            enabled: ${{ needs.detect-changes.outputs.user-service == 'true' }}
            context: backend
            dockerfile: backend/services/user-service/Dockerfile
          - name: otp-service
            enabled: ${{ needs.detect-changes.outputs.otp-service == 'true' }}
            context: backend
            dockerfile: backend/services/otp-service/Dockerfile
          - name: api-gateway
            enabled: ${{ needs.detect-changes.outputs.api-gateway == 'true' }}
            context: backend
            dockerfile: backend/services/api-gateway/Dockerfile
          - name: frontend
            enabled: ${{ needs.detect-changes.outputs.frontend == 'true' }}
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout code
        if: matrix.service.enabled == 'true'
        uses: actions/checkout@v4

      - name: Download JAR artifact
        if: matrix.service.enabled == 'true' && matrix.service.name != 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service.name }}-jar
          path: backend/services/${{ matrix.service.name }}/target/

      - name: Download frontend build
        if: matrix.service.enabled == 'true' && matrix.service.name == 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next

      - name: Set up Docker Buildx
        if: matrix.service.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: matrix.service.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: matrix.service.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/godayana-${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/godayana-${{ matrix.service.name }}:${{ github.sha }}

      - name: Skip message
        if: matrix.service.enabled == 'false'
        run: echo "⏭️ Skipping Docker build for ${{ matrix.service.name }}"

  # ============ DEPLOY TO RAILWAY ============
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [detect-changes, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: auth-service
            enabled: ${{ needs.detect-changes.outputs.auth-service == 'true' }}
          - name: user-service
            enabled: ${{ needs.detect-changes.outputs.user-service == 'true' }}
          - name: otp-service
            enabled: ${{ needs.detect-changes.outputs.otp-service == 'true' }}
          - name: api-gateway
            enabled: ${{ needs.detect-changes.outputs.api-gateway == 'true' }}
          - name: frontend
            enabled: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    steps:
      - name: Checkout code
        if: matrix.service.enabled == 'true'
        uses: actions/checkout@v4

      - name: Install Railway CLI
        if: matrix.service.enabled == 'true'
        run: npm install -g @railway/cli

      - name: Deploy ${{ matrix.service.name }}
        if: matrix.service.enabled == 'true'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway up --service ${{ matrix.service.name }}
          echo "✅ Deployed ${{ matrix.service.name }}"

      - name: Skip message
        if: matrix.service.enabled == 'false'
        run: echo "⏭️ Skipping deployment for ${{ matrix.service.name }}"

  # ============ DEPLOYMENT SUMMARY ============
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-railway]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Auth Service: ${{ needs.detect-changes.outputs.auth-service == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- User Service: ${{ needs.detect-changes.outputs.user-service == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- OTP Service: ${{ needs.detect-changes.outputs.otp-service == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Gateway: ${{ needs.detect-changes.outputs.api-gateway == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.detect-changes.outputs.frontend == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Databases:" >> $GITHUB_STEP_SUMMARY
          echo "- All databases preserved (data intact)" >> $GITHUB_STEP_SUMMARY
