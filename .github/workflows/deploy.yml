name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'backend/services/**'
      - 'frontend/**'
      - 'backend/docker/**'
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  # ============ DETECT CHANGED SERVICES ============
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.filter.outputs.auth-service }}
      user-service: ${{ steps.filter.outputs.user-service }}
      otp-service: ${{ steps.filter.outputs.otp-service }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'backend/services/auth-service/**'
              - 'backend/common/**'
            user-service:
              - 'backend/services/user-service/**'
              - 'backend/common/**'
            otp-service:
              - 'backend/services/otp-service/**'
              - 'backend/common/**'
            api-gateway:
              - 'backend/services/api-gateway/**'
              - 'backend/common/**'
            frontend:
              - 'frontend/**'

  # ============ BUILD BACKEND SERVICES ============
  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service:
          - name: auth-service
            enabled: ${{ needs.detect-changes.outputs.auth-service == 'true' }}
          - name: user-service
            enabled: ${{ needs.detect-changes.outputs.user-service == 'true' }}
          - name: otp-service
            enabled: ${{ needs.detect-changes.outputs.otp-service == 'true' }}
          - name: api-gateway
            enabled: ${{ needs.detect-changes.outputs.api-gateway == 'true' }}
    steps:
      - name: Checkout code
        if: matrix.service.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up JDK 17
        if: matrix.service.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        if: matrix.service.enabled == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build ${{ matrix.service.name }}
        if: matrix.service.enabled == 'true'
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests -pl services/${{ matrix.service.name }} -am

      - name: Upload JAR artifact
        if: matrix.service.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.name }}-jar
          path: backend/services/${{ matrix.service.name }}/target/*.jar
          retention-days: 1

  # ============ BUILD FRONTEND ============
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 1

  # ============ BUILD DOCKER IMAGES ============
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: auth-service
            enabled: ${{ needs.detect-changes.outputs.auth-service == 'true' }}
            context: backend
            dockerfile: backend/services/auth-service/Dockerfile
          - name: user-service
            enabled: ${{ needs.detect-changes.outputs.user-service == 'true' }}
            context: backend
            dockerfile: backend/services/user-service/Dockerfile
          - name: otp-service
            enabled: ${{ needs.detect-changes.outputs.otp-service == 'true' }}
            context: backend
            dockerfile: backend/services/otp-service/Dockerfile
          - name: api-gateway
            enabled: ${{ needs.detect-changes.outputs.api-gateway == 'true' }}
            context: backend
            dockerfile: backend/services/api-gateway/Dockerfile
          - name: frontend
            enabled: ${{ needs.detect-changes.outputs.frontend == 'true' }}
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout code
        if: matrix.service.enabled == 'true'
        uses: actions/checkout@v4

      - name: Download JAR artifact
        if: matrix.service.enabled == 'true' && matrix.service.name != 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service.name }}-jar
          path: backend/services/${{ matrix.service.name }}/target/

      - name: Download frontend build
        if: matrix.service.enabled == 'true' && matrix.service.name == 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next

      - name: Set up Docker Buildx
        if: matrix.service.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: matrix.service.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: matrix.service.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/godayana-${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/godayana-${{ matrix.service.name }}:${{ github.sha }}

  # ============ DEPLOY TO RAILWAY ============
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [detect-changes, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway up

  # ============ DEPLOYMENT SUMMARY ============
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-railway]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Auth Service: ${{ needs.detect-changes.outputs.auth-service == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- User Service: ${{ needs.detect-changes.outputs.user-service == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- OTP Service: ${{ needs.detect-changes.outputs.otp-service == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Gateway: ${{ needs.detect-changes.outputs.api-gateway == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.detect-changes.outputs.frontend == 'true' && '✅ Deployed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
