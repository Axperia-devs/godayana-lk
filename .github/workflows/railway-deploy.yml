name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/services/**'
      - 'backend/common/**'
      - 'backend/pom.xml'

jobs:
  deploy-auth:
    if: contains(github.event.head_commit.modified, 'backend/services/auth-service') || contains(github.event.head_commit.modified, 'backend/common')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Railway
        run: npm install -g @railway/cli
      - name: Deploy Auth Service
        run: railway up --service auth-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-otp:
    if: contains(github.event.head_commit.modified, 'backend/services/otp-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Railway
        run: npm install -g @railway/cli
      - name: Deploy OTP Service
        run: railway up --service otp-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-user:
    if: contains(github.event.head_commit.modified, 'backend/services/user-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Railway
        run: npm install -g @railway/cli
      - name: Deploy User Service
        run: railway up --service user-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-gateway:
    if: contains(github.event.head_commit.modified, 'backend/services/api-gateway')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Railway
        run: npm install -g @railway/cli
      - name: Deploy API Gateway
        run: railway up --service api-gateway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}