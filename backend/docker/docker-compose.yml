version: '3.8'

services:
  postgres-auth:
    build:
      context: ./docker/postgres-auth
      dockerfile: Dockerfile
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: auth_db
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - godayana-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U godayana -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    build:
      context: ./backend/docker/postgres-user
      dockerfile: Dockerfile
    container_name: postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: user_db
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - godayana-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U godayana -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-otp:
    build:
      context: ./backend/docker/postgres-otp
      dockerfile: Dockerfile
    container_name: postgres-otp
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: otp_db
    volumes:
      - postgres-otp-data:/var/lib/postgresql/data
    networks:
      - godayana-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U godayana -d otp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
