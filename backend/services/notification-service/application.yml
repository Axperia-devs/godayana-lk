server:
  port: 8089
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:${NOTIFICATION_DB_URL:postgresql://postgres-notification:5432/notification_db}
    username: ${DB_USERNAME:godayana}
    password: ${DB_PASSWORD:dev123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false  # Temporarily disable validation
    baseline-version: 1
    locations: classpath:db/migration
    table: flyway_schema_history
  mail:
    host: ${MAIL_HOST:mailhog}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          connection-timeout: 5000
          timeout: 5000
          write-timeout: 5000

# SMS Configuration (for future integration)
sms:
  provider: ${SMS_PROVIDER:mock}
  api-key: ${SMS_API_KEY:}
  api-secret: ${SMS_API_SECRET:}
  sender-id: ${SMS_SENDER_ID:GoDayana}

# Notification settings
notification:
  email:
    from: ${EMAIL_FROM:noreply@godayana.lk}
    welcome-subject: "Welcome to GoDayana!"
    otp-subject: "Your OTP Code"
    job-alert-subject: "New Job Alert"
  sms:
    enabled: ${SMS_ENABLED:false}

logging:
  level:
    com.godayana: INFO
    org.springframework.mail: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      
eureka:
  client:
    enabled: false  # Disable Eureka for local development
    register-with-eureka: false
    fetch-registry: false