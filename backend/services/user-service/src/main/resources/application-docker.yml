server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

spring:
  profiles:
    include: common
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-user:5432/user_db}
    username: ${SPRING_DATASOURCE_USERNAME:godayana}
    password: ${SPRING_DATASOURCE_PASSWORD:dev123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    com.godayana: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# File upload configuration
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

# Storage configuration (for resumes, logos, etc.)
storage:
  location: ${STORAGE_LOCATION:/app/uploads}