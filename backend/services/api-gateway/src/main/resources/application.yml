server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
#          filters:
#            # Remove circuit breaker temporarily to test
#            - name: StripPrefix
#              args:
#                parts: 0
#          filters:
