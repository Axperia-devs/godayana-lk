server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

otp:
  service:
    url: ${OTP_SERVICE_URL}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL}

user:
  service:
    url: ${USER_SERVICE_URL}

logging:
  level:
    com.godayana: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"