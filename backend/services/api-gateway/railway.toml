server:
  port: ${PORT:8080}

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR,SERVICE_UNAVAILABLE
        
        - id: otp-service
          uri: ${OTP_SERVICE_URL}
          predicates:
            - Path=/api/v1/otp/**
          filters:
            - name: CircuitBreaker
              args:
                name: otpService
                fallbackUri: forward:/fallback
        
        - id: user-service
          uri: ${USER_SERVICE_URL}
          predicates:
            - Path=/api/v1/users/**, /api/v1/profiles/**, /api/v1/seeker/**, /api/v1/company/**
          filters:
            - name: CircuitBreaker
              args:
                name: userService
                fallbackUri: forward:/fallback

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.godayana: INFO
    org.springframework.cloud.gateway: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info